version: "3.9"

services:
  gateway:
    build: ../gateway-service
    container_name: nexus-gateway
    ports:
      - "8000:8000"
    environment:
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_INGESTION_SERVICE_URL: http://ingestion:8001
      NEXUS_PARSER_SERVICE_URL: http://parser:8002
      NEXUS_EMBEDDING_SERVICE_URL: http://embedding:8003
      NEXUS_GRAPH_SERVICE_URL: http://graph:8004
      NEXUS_AI_SERVICE_URL: http://ai:8005
      NEXUS_SEARCH_SERVICE_URL: http://search:8006
      NEXUS_REDIS_HOST: redis
    depends_on:
      - ingestion
      - search
      - ai
      - graph
    networks:
      - nexus-network

  ingestion:
    build: ../ingestion-service
    container_name: nexus-ingestion
    ports:
      - "8001:8001"
    environment:
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_REPOS_BASE_PATH: /app/repos
    volumes:
      - repo_data:/app/repos
    networks:
      - nexus-network

  parser:
    build: ../parser-service
    container_name: nexus-parser
    ports:
      - "8002:8002"
    environment:
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_REPOS_BASE_PATH: /app/repos
    volumes:
      - repo_data:/app/repos
    networks:
      - nexus-network

  embedding:
    build: ../embedding-service
    container_name: nexus-embedding
    ports:
      - "8003:8003"
    environment:
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_CHROMA_HOST: chromadb
      NEXUS_CHROMA_PORT: 8000
    networks:
      - nexus-network

  graph:
    build: ../graph-service
    container_name: nexus-graph
    ports:
      - "8004:8004"
    environment:
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_NEO4J_URI: bolt://neo4j:7687
      NEXUS_NEO4J_USERNAME: neo4j
      NEXUS_NEO4J_PASSWORD: nexus_password
    networks:
      - nexus-network

  ai:
    build: ../ai-service
    container_name: nexus-ai
    ports:
      - "8005:8005"
    environment:
      NEXUS_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NEXUS_SEARCH_SERVICE_URL: http://search:8006
      NEXUS_GRAPH_SERVICE_URL: http://graph:8004
      NEXUS_LLM_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - nexus-network

  search:
    build: ../search-service
    container_name: nexus-search
    ports:
      - "8006:8006"
    environment:
      NEXUS_CHROMA_HOST: chromadb
      NEXUS_CHROMA_PORT: 8000
    networks:
      - nexus-network

volumes:
  repo_data:

networks:
  nexus-network:
    external: true
